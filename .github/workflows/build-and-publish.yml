name: Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Package extension
        run: npx vsce package

      - name: Verify VSIX contents
        run: |
          VSIX_FILE=$(ls *.vsix)
          echo "Verifying VSIX: $VSIX_FILE"

          if [ ! -s "$VSIX_FILE" ]; then
            echo "::error::VSIX file is missing or empty"
            exit 1
          fi

          CONTENTS=$(unzip -l "$VSIX_FILE")
          echo "$CONTENTS"

          EXPECTED_FILES=(
            "extension/src/extension.js"
            "extension/package.json"
            "extension/src/remoteUrl.js"
            "extension/resources/"
          )

          MISSING=()
          for file in "${EXPECTED_FILES[@]}"; do
            if ! echo "$CONTENTS" | grep -q "$file"; then
              MISSING+=("$file")
            fi
          done

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "::error::VSIX is missing expected files:"
            for file in "${MISSING[@]}"; do
              echo "  - $file"
            done
            exit 1
          fi

          echo "All expected files found in VSIX package."

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: '*.vsix'

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vsix

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
